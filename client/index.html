<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevCollab</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css">
</head>
<body>

<!-- Auth Screen -->
<div id="authScreen" class="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" width="32" height="32"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
      <h1>DevCollab</h1>
    </div>
    <p class="auth-subtitle">Real-time collaborative coding</p>
    <div class="auth-form">
      <input type="text" id="usernameInput" placeholder="Your name" maxlength="20">
      <input type="color" id="colorInput" value="#58a6ff" title="Choose your color">
      <button onclick="enterApp()" class="btn-primary">Get Started</button>
    </div>
  </div>
</div>

<!-- Room Selection -->
<div id="roomScreen" class="room-screen" style="display:none">
  <header class="room-header">
    <div class="logo">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
      DevCollab
    </div>
    <div class="user-badge">
      <span id="currentUserName"></span>
      <div class="user-dot" id="currentUserDot"></div>
    </div>
  </header>

  <main class="room-main">
    <div class="room-section">
      <div class="section-header">
        <h2>Projects</h2>
        <button onclick="showCreateRoom()" class="btn-primary btn-small">
          <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          New Project
        </button>
      </div>
      <div id="roomsList" class="rooms-list"></div>
    </div>
  </main>
</div>

<!-- Main App -->
<div id="appScreen" class="app-screen" style="display:none">
  <header class="app-header">
    <div class="header-left">
      <button onclick="backToRooms()" class="btn-icon" title="Back to projects">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="project-info">
        <h3 id="projectName">Project</h3>
        <span id="projectDesc" class="project-desc">Description</span>
      </div>
    </div>
    <nav class="header-nav">
      <button class="active" onclick="switchView('code')" id="btn-code">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
        Code
      </button>
      <button onclick="switchView('preview')" id="btn-preview">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        Preview
      </button>
      <button onclick="switchView('features')" id="btn-features">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Features
      </button>
    </nav>
    <div class="header-right">
      <div class="team-avatars" id="teamAvatars"></div>
      <div class="audio-indicators" id="audioIndicators"></div>
      <button onclick="toggleMic()" id="micBtn" class="btn-icon" title="Toggle microphone">
        <svg id="micIcon" viewBox="0 0 24 24" width="18" height="18"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <button onclick="toggleChat()" class="btn-icon" title="Toggle chat">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </button>
    </div>
  </header>

  <main class="app-main">
    <aside class="sidebar">
      <div class="panel-header">
        <span>Explorer</span>
        <div class="panel-actions">
          <button onclick="newFile()" title="New file" class="btn-icon-small">
            <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          </button>
          <button onclick="newFolder()" title="New folder" class="btn-icon-small">
            <svg viewBox="0 0 24 24" width="14" height="14"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
          </button>
        </div>
      </div>
      <div class="file-tree" id="fileTree"></div>

      <div class="panel-header">
        <span>Team</span>
        <span id="teamCount" class="badge">1</span>
      </div>
      <div class="collaborators" id="collaborators"></div>
    </aside>

    <div class="editor-area" id="editorArea">
      <div class="tabs" id="tabs"></div>
      <div class="editor-container" id="editorContainer">
        <div id="monacoEditor" class="monaco-editor"></div>
      </div>
    </div>

    <div class="preview-panel" id="previewPanel">
      <div class="preview-header">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z"/></svg>
        Live Preview
        <button onclick="refreshPreview()" class="btn-icon-small" title="Refresh">
          <svg viewBox="0 0 24 24" width="12" height="12"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
      </div>
      <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-modals"></iframe>
    </div>

    <div class="features-panel" id="featuresPanel">
      <div class="panel-header">
        <span>Feature Requests</span>
      </div>
      <div class="features-list" id="featuresList"></div>
      <div class="add-feature">
        <input type="text" id="featureTitle" placeholder="Feature title">
        <textarea id="featureDesc" placeholder="Describe the feature..."></textarea>
        <button class="btn-primary" onclick="addFeature()">Submit Feature</button>
      </div>
    </div>

    <div class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <span>Team Chat</span>
        <button onclick="toggleChat()" class="btn-icon-small">
          <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- Create Room Modal -->
<div class="modal" id="createRoomModal">
  <div class="modal-content">
    <h3>Create New Project</h3>
    <input type="text" id="roomNameInput" placeholder="Project name">
    <textarea id="roomDescInput" placeholder="Project description..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCreateRoom()">Cancel</button>
      <button class="btn-primary" onclick="createRoom()">Create Project</button>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
  <div onclick="renameFile()">
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
    Rename
  </div>
  <div onclick="deleteFile()">
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12z"/></svg>
    Delete
  </div>
  <div onclick="downloadFile()">
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 9h-4V3H9v6H5l7 7 7-7z"/></svg>
    Download
  </div>
  <div onclick="duplicateFile()">
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1z"/></svg>
    Duplicate
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" width="16" height="16"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  <span id="toastMsg">Action completed</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
